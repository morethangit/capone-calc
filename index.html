<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monthly Transaction Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F5F3EE;
    --surface: #FDFCF9;
    --border: #DDD9D0;
    --border-light: #EDEAE4;
    --text: #1A1916;
    --muted: #7A766E;
    --accent: #2B5CE6;
    --accent-soft: #EBF0FD;
    --dining: #C8440A;
    --airfare: #5B47C8;
    --merchandise: #1A6FAD;
    --gas: #0F7856;
    --entertainment: #B5327A;
    --other: #7A766E;
    --payment: #2D8A60;
    --radius: 10px;
    --radius-sm: 6px;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.6;
  }

  .page-header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 20px 32px;
    display: flex;
    align-items: baseline;
    gap: 12px;
  }
  .page-header h1 {
    font-family: 'Instrument Serif', serif;
    font-size: 22px;
    font-weight: 400;
    letter-spacing: -0.3px;
  }
  .page-header span {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .container { max-width: 1000px; margin: 0 auto; padding: 32px 24px; }

  /* Upload zone */
  #upload-zone {
    border: 1.5px dashed var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    padding: 56px 32px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    position: relative;
  }
  #upload-zone:hover, #upload-zone.drag-over {
    border-color: var(--accent);
    background: var(--accent-soft);
  }
  #upload-zone input[type="file"] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
  }
  .upload-icon {
    width: 44px; height: 44px; margin: 0 auto 14px;
    background: var(--border-light);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
  }
  .upload-icon svg { width: 20px; height: 20px; stroke: var(--muted); fill: none; stroke-width: 1.5; }
  #upload-zone h2 { font-size: 16px; font-weight: 500; margin-bottom: 6px; }
  #upload-zone p { font-size: 13px; color: var(--muted); }
  .file-hint {
    display: inline-block; margin-top: 14px;
    font-family: 'DM Mono', monospace; font-size: 11px;
    background: var(--border-light); color: var(--muted);
    padding: 4px 10px; border-radius: 20px; letter-spacing: 0.04em;
  }

  /* Dashboard */
  #dashboard { display: none; }

  .section-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--muted);
    margin-bottom: 12px;
  }

  .month-tag {
    display: inline-block;
    font-family: 'DM Mono', monospace;
    font-size: 11px; color: var(--accent);
    background: var(--accent-soft);
    padding: 3px 10px; border-radius: 20px;
    letter-spacing: 0.04em; margin-bottom: 20px;
  }

  /* Metric cards */
  .metrics { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 28px; }
  .metric-card {
    background: var(--surface);
    border: 1px solid var(--border-light);
    border-radius: var(--radius);
    padding: 16px 18px;
  }
  .metric-card .label { font-size: 11px; color: var(--muted); margin-bottom: 6px; letter-spacing: 0.03em; }
  .metric-card .value { font-family: 'DM Mono', monospace; font-size: 22px; font-weight: 500; letter-spacing: -0.5px; }
  .metric-card .sub { font-size: 11px; color: var(--muted); margin-top: 2px; }

  /* Charts row */
  .charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 28px; }
  .chart-card {
    background: var(--surface);
    border: 1px solid var(--border-light);
    border-radius: var(--radius);
    padding: 20px;
  }
  .chart-card .card-title {
    font-size: 12px; color: var(--muted); margin-bottom: 14px;
    font-family: 'DM Mono', monospace; letter-spacing: 0.06em; text-transform: uppercase;
  }
  .legend { display: flex; flex-wrap: wrap; gap: 8px 14px; margin-bottom: 12px; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--muted); }
  .legend-swatch { width: 9px; height: 9px; border-radius: 2px; flex-shrink: 0; }

  /* Category breakdown bars */
  .cat-bars { display: flex; flex-direction: column; gap: 10px; }
  .cat-bar-row { display: flex; align-items: center; gap: 10px; }
  .cat-bar-label { font-size: 12px; width: 110px; flex-shrink: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .cat-bar-track { flex: 1; background: var(--border-light); border-radius: 3px; height: 8px; overflow: hidden; }
  .cat-bar-fill { height: 100%; border-radius: 3px; transition: width 0.5s cubic-bezier(.4,0,.2,1); }
  .cat-bar-amount { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); width: 58px; text-align: right; flex-shrink: 0; }

  /* Transactions table */
  .table-section {
    background: var(--surface);
    border: 1px solid var(--border-light);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .table-toolbar {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border-light);
    display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap;
  }
  .table-toolbar .title { font-size: 12px; color: var(--muted); font-family: 'DM Mono', monospace; letter-spacing: 0.06em; text-transform: uppercase; }
  .filter-pills { display: flex; gap: 6px; flex-wrap: wrap; }
  .pill {
    font-size: 11px; padding: 4px 10px; border-radius: 20px;
    border: 1px solid var(--border); background: transparent; cursor: pointer;
    color: var(--muted); font-family: 'DM Sans', sans-serif;
    transition: all 0.12s; white-space: nowrap;
  }
  .pill:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-soft); }
  .pill.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  table { width: 100%; border-collapse: collapse; }
  thead th {
    font-size: 11px; color: var(--muted); font-weight: 500;
    padding: 10px 16px; text-align: left; letter-spacing: 0.04em;
    border-bottom: 1px solid var(--border-light);
    font-family: 'DM Mono', monospace; text-transform: uppercase;
    background: var(--bg);
  }
  tbody tr { border-bottom: 1px solid var(--border-light); transition: background 0.1s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--bg); }
  tbody td { padding: 10px 16px; font-size: 13px; vertical-align: middle; }
  .td-date { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); white-space: nowrap; }
  .td-desc { max-width: 240px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .td-amount { font-family: 'DM Mono', monospace; font-size: 13px; text-align: right; white-space: nowrap; font-weight: 500; }
  .cat-badge {
    display: inline-block; font-size: 10px; padding: 2px 8px;
    border-radius: 20px; font-weight: 500; letter-spacing: 0.03em;
    white-space: nowrap;
  }

  /* Reset button */
  .reset-btn {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 12px; color: var(--muted);
    background: none; border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 6px 12px;
    cursor: pointer; font-family: 'DM Sans', sans-serif;
    transition: all 0.12s; margin-bottom: 20px;
  }
  .reset-btn:hover { border-color: var(--accent); color: var(--accent); }

  #error-msg {
    background: #FEF2F2; border: 1px solid #FECACA;
    border-radius: var(--radius); padding: 14px 18px;
    color: #991B1B; font-size: 13px; margin-top: 12px; display: none;
  }

  @media (max-width: 640px) {
    .metrics { grid-template-columns: 1fr 1fr; }
    .charts-row { grid-template-columns: 1fr; }
    .container { padding: 20px 16px; }
  }
</style>
</head>
<body>

<header class="page-header">
  <h1>Transaction Dashboard</h1>
  <span>Monthly Spending Analysis</span>
</header>

<div class="container">

  <div id="upload-zone">
    <input type="file" id="file-input" accept=".csv,.xlsx,.xls" />
    <div class="upload-icon">
      <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
    </div>
    <h2>Drop your transaction file here</h2>
    <p>Or click to browse — works with your monthly export</p>
    <span class="file-hint">.csv &nbsp;·&nbsp; .xlsx &nbsp;·&nbsp; .xls</span>
  </div>

  <div id="error-msg"></div>

  <div id="dashboard">
    <button class="reset-btn" id="reset-btn">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.5"/></svg>
      Load a different file
    </button>

    <div id="month-tag" class="month-tag"></div>

    <div class="metrics" id="metrics"></div>

    <div class="charts-row">
      <div class="chart-card">
        <div class="card-title">Spending by category</div>
        <div class="legend" id="donut-legend"></div>
        <div style="position:relative;height:200px;">
          <canvas id="donutChart" role="img" aria-label="Donut chart of spending by category"></canvas>
        </div>
      </div>
      <div class="chart-card">
        <div class="card-title">Category breakdown</div>
        <div class="cat-bars" id="cat-bars"></div>
      </div>
    </div>

    <div class="chart-card" style="margin-bottom:28px;">
      <div class="card-title">Weekly spending</div>
      <div style="position:relative;height:160px;">
        <canvas id="weeklyChart" role="img" aria-label="Bar chart of weekly spending"></canvas>
      </div>
    </div>

    <div class="table-section">
      <div class="table-toolbar">
        <span class="title">Transactions</span>
        <div class="filter-pills" id="filter-pills"></div>
      </div>
      <div style="overflow-x:auto;">
        <table>
          <thead>
            <tr>
              <th>Date</th>
              <th>Description</th>
              <th>Category</th>
              <th style="text-align:right;">Amount</th>
            </tr>
          </thead>
          <tbody id="txn-tbody"></tbody>
        </table>
      </div>
    </div>
  </div>

</div>

<script>
const CAT_COLORS = {
  'Dining':        { fill: '#FFE8DF', text: '#C8440A', bar: '#C8440A' },
  'Airfare':       { fill: '#ECEAFC', text: '#5B47C8', bar: '#5B47C8' },
  'Merchandise':   { fill: '#DDF0FF', text: '#1A6FAD', bar: '#1A6FAD' },
  'Gas/Automotive':{ fill: '#D8F5EC', text: '#0F7856', bar: '#0F7856' },
  'Entertainment': { fill: '#FCE4F3', text: '#B5327A', bar: '#B5327A' },
  'Payment/Credit':{ fill: '#D9F5EA', text: '#2D8A60', bar: '#2D8A60' },
  'Other Services':{ fill: '#F0EDEA', text: '#7A766E', bar: '#7A766E' },
  'Other':         { fill: '#F0EDEA', text: '#7A766E', bar: '#7A766E' },
};

function catColor(cat) {
  return CAT_COLORS[cat] || { fill: '#F0EDEA', text: '#7A766E', bar: '#7A766E' };
}

let donutInstance = null;
let weeklyInstance = null;

// ── File handling ──────────────────────────────────────────────────────────────
const zone = document.getElementById('upload-zone');
const fileInput = document.getElementById('file-input');

zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
zone.addEventListener('drop', e => {
  e.preventDefault(); zone.classList.remove('drag-over');
  const f = e.dataTransfer.files[0];
  if (f) processFile(f);
});
fileInput.addEventListener('change', e => { if (e.target.files[0]) processFile(e.target.files[0]); });
document.getElementById('reset-btn').addEventListener('click', () => {
  document.getElementById('dashboard').style.display = 'none';
  zone.style.display = 'block';
  fileInput.value = '';
});

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg;
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 6000);
}

function processFile(file) {
  const ext = file.name.split('.').pop().toLowerCase();
  if (ext === 'csv') {
    const reader = new FileReader();
    reader.onload = e => {
      const result = Papa.parse(e.target.result.trim(), { header: true, skipEmptyLines: true });
      if (result.errors.length && !result.data.length) { showError('Could not parse CSV. Check the file format.'); return; }
      renderDashboard(result.data);
    };
    reader.readAsText(file);
  } else if (ext === 'xlsx' || ext === 'xls') {
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const wb = XLSX.read(new Uint8Array(e.target.result), { type: 'array', cellDates: true });
        const ws = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(ws, { defval: '' });
        renderDashboard(rows);
      } catch(err) { showError('Could not read Excel file: ' + err.message); }
    };
    reader.readAsArrayBuffer(file);
  } else {
    showError('Please upload a .csv, .xlsx, or .xls file.');
  }
}

// ── Column detection ────────────────────────────────────────────────────────────
function detectCols(row) {
  const keys = Object.keys(row);
  const find = (...terms) => keys.find(k => terms.some(t => k.toLowerCase().includes(t.toLowerCase())));
  return {
    date:   find('Transaction Date', 'Date', 'trans'),
    desc:   find('Description', 'Merchant', 'Name', 'Memo'),
    cat:    find('Category', 'Type', 'Tag'),
    debit:  find('Debit', 'Amount', 'Charge', 'Withdrawal'),
    credit: find('Credit', 'Payment', 'Deposit'),
  };
}

function parseAmt(val) {
  if (val === null || val === undefined || val === '') return null;
  if (typeof val === 'number') return isNaN(val) ? null : val;
  const s = String(val).replace(/[$,\s]/g, '').replace(/[()]/g, '');
  const n = parseFloat(s);
  return isNaN(n) ? null : n;
}

function parseDate(val) {
  if (!val) return null;
  if (val instanceof Date) return val;
  const d = new Date(val);
  return isNaN(d) ? null : d;
}

// ── Main render ────────────────────────────────────────────────────────────────
function renderDashboard(rows) {
  if (!rows.length) { showError('No data found in file.'); return; }

  const cols = detectCols(rows[0]);
  if (!cols.date || !cols.desc) { showError('Could not detect required columns (Date, Description). Check file format.'); return; }

  const txns = rows.map(r => ({
    date:   parseDate(r[cols.date]),
    desc:   String(r[cols.desc] || '').trim(),
    cat:    String(r[cols.cat] || 'Other').trim() || 'Other',
    debit:  parseAmt(r[cols.debit]),
    credit: parseAmt(r[cols.credit]),
  })).filter(t => t.desc);

  // Month label
  const dates = txns.map(t => t.date).filter(Boolean);
  let monthLabel = '';
  if (dates.length) {
    const sorted = dates.sort((a,b) => a - b);
    const mid = sorted[Math.floor(sorted.length/2)];
    monthLabel = mid.toLocaleString('default', { month: 'long', year: 'numeric' });
  }
  document.getElementById('month-tag').textContent = monthLabel || 'Statement Period';

  const debits = txns.filter(t => t.debit !== null && t.debit > 0);
  const credits = txns.filter(t => t.credit !== null && t.credit > 0);
  const totalSpent = debits.reduce((s, t) => s + t.debit, 0);
  const totalPaid = credits.reduce((s, t) => s + t.credit, 0);
  const largest = debits.length ? Math.max(...debits.map(t => t.debit)) : 0;
  const avgTxn = debits.length ? totalSpent / debits.length : 0;

  // Metrics
  document.getElementById('metrics').innerHTML = [
    ['Total spent', '$' + totalSpent.toFixed(2), debits.length + ' charges'],
    ['Total paid', '$' + totalPaid.toFixed(2), credits.length + ' payments'],
    ['Largest charge', '$' + largest.toFixed(2), ''],
    ['Avg per charge', '$' + avgTxn.toFixed(2), ''],
  ].map(([label, value, sub]) => `
    <div class="metric-card">
      <div class="label">${label}</div>
      <div class="value">${value}</div>
      ${sub ? `<div class="sub">${sub}</div>` : ''}
    </div>`).join('');

  // Category totals
  const catTotals = {};
  debits.forEach(t => { catTotals[t.cat] = (catTotals[t.cat] || 0) + t.debit; });
  const sortedCats = Object.entries(catTotals).sort((a,b) => b[1]-a[1]);
  const maxCat = sortedCats.length ? sortedCats[0][1] : 1;

  // Donut chart
  if (donutInstance) { donutInstance.destroy(); }
  const donutColors = sortedCats.map(([c]) => catColor(c).bar);
  donutInstance = new Chart(document.getElementById('donutChart'), {
    type: 'doughnut',
    data: {
      labels: sortedCats.map(([c]) => c),
      datasets: [{ data: sortedCats.map(([,v]) => +v.toFixed(2)), backgroundColor: donutColors, borderWidth: 2, borderColor: 'transparent' }]
    },
    options: {
      responsive: true, maintainAspectRatio: false, cutout: '62%',
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: ctx => ` $${ctx.parsed.toFixed(2)} (${(ctx.parsed/totalSpent*100).toFixed(1)}%)` } }
      }
    }
  });

  // Donut legend
  document.getElementById('donut-legend').innerHTML = sortedCats.map(([c, v]) => `
    <span class="legend-item">
      <span class="legend-swatch" style="background:${catColor(c).bar}"></span>
      ${c} · ${(v/totalSpent*100).toFixed(0)}%
    </span>`).join('');

  // Category bars
  document.getElementById('cat-bars').innerHTML = sortedCats.map(([c, v]) => `
    <div class="cat-bar-row">
      <span class="cat-bar-label">${c}</span>
      <div class="cat-bar-track">
        <div class="cat-bar-fill" style="width:${(v/maxCat*100).toFixed(1)}%;background:${catColor(c).bar};"></div>
      </div>
      <span class="cat-bar-amount">$${v.toFixed(2)}</span>
    </div>`).join('');

  // Weekly chart
  const weekMap = {};
  debits.forEach(t => {
    if (!t.date) return;
    const d = new Date(t.date);
    // Week key = Monday of that week
    const day = d.getDay();
    const diff = d.getDate() - day + (day === 0 ? -6 : 1);
    const mon = new Date(d); mon.setDate(diff); mon.setHours(0,0,0,0);
    const key = mon.toISOString().slice(0,10);
    weekMap[key] = (weekMap[key] || 0) + t.debit;
  });
  const weekKeys = Object.keys(weekMap).sort();
  const weekLabels = weekKeys.map(k => {
    const d = new Date(k + 'T00:00:00');
    return d.toLocaleDateString('default', { month: 'short', day: 'numeric' });
  });
  if (weeklyInstance) { weeklyInstance.destroy(); }
  weeklyInstance = new Chart(document.getElementById('weeklyChart'), {
    type: 'bar',
    data: {
      labels: weekLabels,
      datasets: [{
        label: 'Spending', data: weekKeys.map(k => +weekMap[k].toFixed(2)),
        backgroundColor: '#2B5CE6', borderRadius: 4
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: { callbacks: { label: c => ` $${c.parsed.y.toFixed(2)}` } } },
      scales: {
        x: { ticks: { font: { size: 11, family: 'DM Mono' }, autoSkip: false, maxRotation: 0 }, grid: { display: false } },
        y: { ticks: { callback: v => '$' + v, font: { size: 11, family: 'DM Mono' } }, grid: { color: 'rgba(0,0,0,0.04)' } }
      }
    }
  });

  // Filter pills
  const allCats = ['All', ...sortedCats.map(([c]) => c), 'Payment/Credit'];
  const uniqueCats = [...new Set(allCats)];
  let activeCat = 'All';
  const pillsEl = document.getElementById('filter-pills');

  function renderPills() {
    pillsEl.innerHTML = uniqueCats.map(c => `
      <button class="pill ${c === activeCat ? 'active' : ''}" data-cat="${c}">${c}</button>`).join('');
    pillsEl.querySelectorAll('.pill').forEach(btn => {
      btn.addEventListener('click', () => { activeCat = btn.dataset.cat; renderPills(); renderTable(); });
    });
  }

  // Transaction table
  function renderTable() {
    const filtered = activeCat === 'All' ? txns : txns.filter(t => t.cat === activeCat);
    const sorted = [...filtered].sort((a,b) => (b.date||0) - (a.date||0));
    document.getElementById('txn-tbody').innerHTML = sorted.map(t => {
      const isCredit = t.credit !== null && t.debit === null;
      const amt = isCredit ? t.credit : t.debit;
      const amtStr = isCredit ? `<span style="color:#2D8A60">+$${amt.toFixed(2)}</span>` : `<span>−$${amt.toFixed(2)}</span>`;
      const cc = catColor(t.cat);
      const badge = `<span class="cat-badge" style="background:${cc.fill};color:${cc.text};">${t.cat}</span>`;
      const dateStr = t.date ? t.date.toLocaleDateString('default', {month:'short', day:'numeric', year:'2-digit'}) : '—';
      return `<tr>
        <td class="td-date">${dateStr}</td>
        <td class="td-desc" title="${t.desc}">${t.desc}</td>
        <td>${badge}</td>
        <td class="td-amount">${amtStr}</td>
      </tr>`;
    }).join('');
  }

  renderPills();
  renderTable();

  zone.style.display = 'none';

}
